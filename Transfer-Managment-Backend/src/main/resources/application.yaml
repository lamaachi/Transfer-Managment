server:
  port: 8081
spring:
  application:
    name: virementManagment
  # H2 Database Configuration
  datasource:
    url: "jdbc:h2:mem:virementdb"
    driverClassName: org.h2.Driver
    username: "sa"
    password: "password"
  # Hibernate Configuration

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
 # Enable H2 Console (to view DB in browser if needed)
  h2:
    console:
      enabled: true
      path: /h2-console


